# Netlify 配置文件
# 文档：https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  # 前端目录（当前目录就是 front，所以 base 为空或 .）
  base = "."
  
  # 构建命令（纯静态站点不需要构建）
  command = "echo 'Building static site...'"
  
  # 发布目录（当前目录）
  publish = "."

# 设置环境变量
[build.environment]
  NODE_VERSION = "18"
  # 后端 API 地址
  API_URL = "http://103.40.13.68:10951"

# 重定向规则 - API 代理到后端
[[redirects]]
  from = "/api/*"
  to = "http://103.40.13.68:10951/api/:splat"
  status = 200
  force = true

# SPA 路由支持（所有路径重定向到 index.html）
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# 设置安全头
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# 静态资源缓存优化
[[headers]]
  for = "/styles/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/scripts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"
