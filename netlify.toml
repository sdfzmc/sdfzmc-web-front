# Netlify 配置文件
# 文档：https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  # 前端目录
  base = "."
  
  # 构建命令 - 使用 Node.js 构建脚本
  command = "npm run build"
  
  # 发布目录 - 必须是 public 目录
  publish = "public"

# 设置环境变量
[build.environment]
  NODE_VERSION = "18"
  # 后端 API 地址
  API_URL = "http://103.40.13.68:10951"

# 重定向规则 - API 代理到后端
[[redirects]]
  from = "/api/*"
  to = "http://103.40.13.68:10951/api/:splat"
  status = 200
  force = true

# SPA 路由支持（所有路径重定向到 index.html，但不影响已存在的文件）
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false

# 设置安全头
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# 静态资源缓存优化
[[headers]]
  for = "/styles/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/scripts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"
